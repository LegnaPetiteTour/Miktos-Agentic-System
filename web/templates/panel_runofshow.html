{# panel_runofshow.html — Run-of-show control panel (HTMX partial) #}

<style>
  #panel-runofshow .ros-select-row {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.75rem;
    align-items: center;
  }
  #panel-runofshow .ros-select {
    flex: 1;
    font-size: 0.78rem;
    font-family: var(--font-ui);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 0.3rem 0.5rem;
  }
  #panel-runofshow .ros-progress {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
    font-family: var(--font-mono);
  }
  #panel-runofshow .ros-show-name {
    font-weight: 700;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  /* Active cue box */
  #panel-runofshow .ros-active-cue {
    border: 2px solid var(--accent);
    border-radius: 4px;
    padding: 0.5rem 0.7rem;
    margin-bottom: 0.4rem;
    min-height: 2.5rem;
  }
  #panel-runofshow .ros-cue-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }
  #panel-runofshow .ros-active-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  #panel-runofshow .ros-active-notes {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.2rem;
    line-height: 1.4;
  }
  /* Next cue box */
  #panel-runofshow .ros-next-cue {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.4rem 0.7rem;
    margin-bottom: 0.6rem;
    min-height: 1.8rem;
  }
  #panel-runofshow .ros-next-label {
    font-size: 0.85rem;
    color: var(--text);
  }
  /* Advance button */
  #panel-runofshow .ros-advance-btn {
    width: 100%;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: var(--font-ui);
    padding: 0.5rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  #panel-runofshow .ros-advance-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(88, 166, 255, 0.08);
  }
  #panel-runofshow .ros-advance-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  /* Cue list */
  #panel-runofshow .ros-cue-list {
    margin-top: 0.75rem;
    max-height: 9rem;
    overflow-y: auto;
  }
  #panel-runofshow .ros-cue-item {
    display: flex;
    flex-direction: column;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
  }
  #panel-runofshow .ros-cue-item:hover {
    background: rgba(255,255,255,0.04);
  }
  #panel-runofshow .ros-cue-item--active {
    background: rgba(88, 166, 255, 0.1);
    cursor: default;
  }
  #panel-runofshow .ros-cue-row {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
    font-size: 0.76rem;
  }
  #panel-runofshow .ros-cue-num {
    color: var(--muted);
    font-size: 0.68rem;
    flex-shrink: 0;
    font-family: var(--font-mono);
  }
  #panel-runofshow .ros-cue-label {
    color: var(--text);
    font-weight: 500;
  }
  #panel-runofshow .ros-cue-item--active .ros-cue-label {
    color: var(--accent);
    font-weight: 700;
  }
  /* Inline notes under the cue label — only for active cue in list */
  #panel-runofshow .ros-cue-note {
    font-size: 0.68rem;
    color: var(--muted);
    padding-left: 1.2rem;
    margin-top: 0.05rem;
    line-height: 1.35;
    display: none;
  }
  #panel-runofshow .ros-cue-item--active .ros-cue-note {
    display: block;
  }
</style>

<section class="panel" id="panel-runofshow">
  <h2 class="panel-title">Run of Show</h2>

  <div class="ros-select-row">
    <select id="ros-template-select" class="ros-select">
      <option value="">— load template —</option>
    </select>
    <button class="btn" onclick="rosLoadTemplate()" style="font-size:0.78rem;padding:0.3rem 0.6rem;">Load</button>
  </div>

  <div id="ros-progress" class="ros-progress"></div>
  <div id="ros-show-name" class="ros-show-name"></div>

  <div class="ros-active-cue">
    <div class="ros-cue-eyebrow">Active Cue</div>
    <div id="ros-active-label" class="ros-active-label">—</div>
    <div id="ros-active-notes" class="ros-active-notes"></div>
  </div>

  <div class="ros-next-cue">
    <div class="ros-cue-eyebrow">Next</div>
    <div id="ros-next-label" class="ros-next-label">—</div>
  </div>

  <button id="btn-ros-advance" class="ros-advance-btn" onclick="rosAdvance()">
    ▶ Advance
  </button>

  <div id="ros-cue-list" class="ros-cue-list"></div>
</section>

<script>
(function () {
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  async function loadTemplateList() {
    try {
      const r = await fetch("/api/templates");
      const d = await r.json();
      const sel = document.getElementById("ros-template-select");
      if (!sel) return;
      (d.templates || []).forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.id;
        opt.textContent = `${t.name} (${t.cue_count} cues)`;
        sel.appendChild(opt);
      });
    } catch { /* ignore */ }
  }

  async function rosLoadTemplate() {
    const sel = document.getElementById("ros-template-select");
    if (!sel || !sel.value) return;
    try {
      const r = await fetch("/api/runofshow/load", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({template: sel.value}),
      });
      renderState(await r.json());
    } catch { /* ignore */ }
  }

  async function rosAdvance() {
    try {
      const r = await fetch("/api/runofshow/advance", {method: "POST"});
      renderState(await r.json());
    } catch { /* ignore */ }
  }

  async function rosJump(cueId) {
    try {
      const r = await fetch(`/api/runofshow/jump/${encodeURIComponent(cueId)}`, {method: "POST"});
      renderState(await r.json());
    } catch { /* ignore */ }
  }

  function renderState(d) {
    const q = id => document.getElementById(id);

    const prog = q("ros-progress");
    if (prog) prog.textContent = d.progress || "";

    const name = q("ros-show-name");
    if (name) name.textContent = d.show_name || "";

    const active = d.active_cue;
    const lbl = q("ros-active-label");
    if (lbl) lbl.textContent = active ? active.label : "—";
    const notes = q("ros-active-notes");
    if (notes) notes.textContent = (active && active.notes) ? active.notes : "";

    const next = d.next_cue;
    const nextLbl = q("ros-next-label");
    if (nextLbl) nextLbl.textContent = next ? next.label : "— end of show —";

    const btn = q("btn-ros-advance");
    if (btn) btn.disabled = !!(d.at_end || !d.show_id);

    // Cue list — no title tooltip, notes shown inline under active cue
    const list = q("ros-cue-list");
    if (list && Array.isArray(d.cues)) {
      list.innerHTML = d.cues.map((cue, idx) => {
        const isActive = idx === d.active_cue_index;
        const cls      = "ros-cue-item" + (isActive ? " ros-cue-item--active" : "");
        const onclick  = isActive ? "" : `onclick="rosJump('${esc(cue.id)}')"`;
        const noteHtml = cue.notes
          ? `<div class="ros-cue-note">${esc(cue.notes)}</div>` : "";
        return `<div class="${cls}" ${onclick}>
          <div class="ros-cue-row">
            <span class="ros-cue-num">${idx + 1}.</span>
            <span class="ros-cue-label">${esc(cue.label)}</span>
          </div>
          ${noteHtml}
        </div>`;
      }).join("");
    }
  }

  async function refreshState() {
    try {
      const r = await fetch("/api/runofshow/show");
      renderState(await r.json());
    } catch { /* ignore */ }
  }

  window.rosLoadTemplate = rosLoadTemplate;
  window.rosAdvance      = rosAdvance;
  window.rosJump         = rosJump;

  loadTemplateList();
  refreshState();
  setInterval(refreshState, 5000);
})();
</script>
