<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Miktos Cockpit{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ css_version }}" />
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">Miktos</span>
    <a class="nav-link {% if request.url.path == '/home' or request.url.path == '/' %}active{% endif %}" href="/home">Home</a>
    <a class="nav-link {% if request.url.path == '/produce' %}active{% endif %}" href="/produce">Produce</a>
    <a class="nav-link {% if request.url.path == '/setup' or '/onboarding' in request.url.path %}active{% endif %}" href="/setup">Setup</a>
    <a class="nav-link {% if '/sessions' in request.url.path %}active{% endif %}" href="/sessions">Sessions</a>
    <a class="nav-link {% if request.url.path == '/diagnostics' %}active{% endif %}" href="/diagnostics">Diagnostics</a>
    {% if auth_enabled %}
    <form method="post" action="/logout" style="margin:0;margin-left:auto;">
      <button type="submit" class="nav-link nav-logout" style="background:none;border:none;cursor:pointer;padding:0;">Sign out</button>
    </form>
    {% endif %}
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
