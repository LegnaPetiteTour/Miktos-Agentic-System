<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miktos — Login</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    /* Login page is centred, minimal layout — no nav */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 340px;
    }
    .login-brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .login-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .login-field label {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .login-field input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-field input[type="password"]:focus {
      border-color: var(--accent);
    }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 0.55rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-error {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">Miktos</div>
    <div class="login-subtitle">Live Cockpit — sign in to continue</div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="login-field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          autofocus
          required
        />
      </div>
      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>
</body>
</html>
