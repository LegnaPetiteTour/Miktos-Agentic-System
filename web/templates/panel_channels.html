{# panel_channels.html — Pearl channel assignment panel (HTMX partial)
   Fetches all channels live from Pearl and lets the operator assign
   which channel is EN and which is FR. Writes to session_config.yaml. #}
<section class="panel" id="panel-channels">
  <h2 class="panel-title">Pearl Channels</h2>
  <div id="channel-list"><span class="muted">Discovering…</span></div>
  <div id="channel-status" class="muted" style="font-size:0.8rem;margin-top:0.4rem;"></div>
</section>

<section class="panel" id="panel-inputs">
  <h2 class="panel-title">Pearl Inputs</h2>
  <div id="input-list"><span class="muted">Discovering…</span></div>
</section>

<script>
(function () {
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function loadChannels() {
    try {
      const r = await fetch("/api/pearl/channels");
      const d = await r.json();
      const el = document.getElementById("channel-list");
      if (!el) return;
      if (d.error) {
        el.innerHTML = '<span class="muted">Pearl offline</span>';
        return;
      }
      const channels = d.channels || [];
      if (!channels.length) {
        el.innerHTML = '<span class="muted">No channels found</span>';
        return;
      }
      el.innerHTML = channels.map(ch => {
        const id = ch.id;
        const name = esc(ch.name || `Channel ${id}`);
        const role = ch.role;
        const roleLabel = role === "en"
          ? ' <span class="state-badge state-streaming">EN</span>'
          : role === "fr"
          ? ' <span class="state-badge" style="background:#3a6bc4">FR</span>'
          : "";
        return `<div class="channel-row" style="display:flex;align-items:center;gap:0.5rem;margin:0.25rem 0;">
          <span style="flex:1;font-size:0.85rem;">${name}${roleLabel}</span>
          <button class="btn-sm" onclick="assignChannel('${id}','en')" title="Assign as EN">EN</button>
          <button class="btn-sm" onclick="assignChannel('${id}','fr')" title="Assign as FR">FR</button>
        </div>`;
      }).join("");
    } catch (e) {
      const el = document.getElementById("channel-list");
      if (el) el.innerHTML = '<span class="muted">Error loading channels</span>';
    }
  }

  async function assignChannel(channelId, role) {
    const st = document.getElementById("channel-status");
    if (st) st.textContent = `Assigning channel ${channelId} as ${role.toUpperCase()}…`;
    try {
      const r = await fetch("/api/pearl/assign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ channel_id: channelId, role: role }),
      });
      const d = await r.json();
      if (st) st.textContent = d.success
        ? `✓ Channel ${channelId} assigned as ${role.toUpperCase()}`
        : (d.error || "Failed");
    } catch (e) {
      if (st) st.textContent = "Error: " + e.message;
    }
    loadChannels();
  }

  async function loadInputs() {
    try {
      const r = await fetch("/api/pearl/inputs");
      const d = await r.json();
      const el = document.getElementById("input-list");
      if (!el) return;
      const inputs = d.inputs || [];
      if (!inputs.length) {
        el.innerHTML = '<span class="muted">No inputs found or not supported</span>';
        return;
      }
      el.innerHTML = `<div style="font-size:0.8rem;color:var(--text-muted);">${inputs.length} inputs discovered</div>` +
        inputs.map(inp => {
          const name = esc(inp.name || inp.id || "Unknown");
          const type = inp.type ? ` <span class="muted" style="font-size:0.75rem;">${esc(inp.type)}</span>` : "";
          return `<div style="font-size:0.82rem;padding:0.15rem 0;">${name}${type}</div>`;
        }).join("");
    } catch (e) {
      const el = document.getElementById("input-list");
      if (el) el.innerHTML = '<span class="muted">Error loading inputs</span>';
    }
  }

  window.assignChannel = assignChannel;
  loadChannels();
  loadInputs();
  setInterval(loadChannels, 15000);
})();
</script>
